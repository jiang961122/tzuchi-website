<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>慈濟大學 | 跨域自主學士制度</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #008040;
            --primary-blue: #004A8D;
            --bg-light: #fbfbfd;
            --text-main: #1d1d1f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            color: var(--text-main);
            background-color: #fff;
            line-height: 1.6;
        }

        /* 導航欄樣式 */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            height: 60px; /* 稍微增加高度以容納 Logo */
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid #d2d2d7;
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .nav-container {
            width: 90%;
            max-width: 1100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Logo 樣式修正：水平置中文字與圖片 */
        .nav-logo { 
            display: flex;
            align-items: center;
            font-weight: 700; 
            color: var(--primary-blue); 
            text-decoration: none; 
            font-size: 1.2rem;
        }

        .header-logo {
            height: 35px;
            width: auto;
            margin-right: 10px;
        }

        .nav-links a {
            font-size: 13px;
            text-decoration: none;
            color: var(--text-main);
            margin-left: 20px;
            opacity: 0.8;
            transition: 0.3s;
        }

        .nav-links a:hover { opacity: 1; color: var(--primary-green); }

        /* 側邊導航點 */
        .side-nav {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 999;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
